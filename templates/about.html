<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Drisya ✨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 100%); 
            font-family: 'Poppins', sans-serif;
            padding-top: 80px; 
            color: #5d4037;
        }
        .profile-card { 
            border: 2px solid #ffdde1; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 3rem;
        }
        h2 { font-family: 'Playfair Display', serif; color: #ff758c; }
        .highlight { color: #ff758c; font-weight: 600; border-bottom: 2px dashed #ffb6c1; }
        .badge-girly { background-color: #ffafcc; color: white; border-radius: 50px; padding: 5px 15px; }
        .btn-back { border-radius: 50px; color: #ff758c; border: 1px solid #ff758c; transition: 0.3s; }
        .btn-back:hover { background: #ff758c; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card profile-card text-center">
                    <div class="mb-3">✨ 🎀 ✨</div>
                    <h2 class="fw-bold">Drisya</h2>
                    <p class="text-muted small">1st Year BSc AIML Student</p>
                    <hr style="opacity: 0.1;">
                    <p class="lead mt-4">
                        Hi, my name is <span class="highlight">Drisya</span> and I'm a student at 
                        <strong>Kristu Jayanti University</strong>. 🌸
                    </p>
                    <p>
                        I've been exploring the worlds of <span class="badge-girly">HTML</span> and 
                        <span class="badge-girly">C Programming</span>. 
                        I believe in making tech beautiful and smart!
                    </p>
                    <div class="mt-4">
                        <a href="/" class="btn btn-back btn-sm">← Back to Feed</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
