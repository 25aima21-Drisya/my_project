<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drisya's Digital Space ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffafcc;
            --deep-pink: #ff85a2;
            --cream: #fff9fb;
            --text-color: #5d4037;
        }

        body { 
            /* Soft gradient background */
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif; 
            color: var(--text-color); 
            padding-top: 60px; 
        }

        /* Handwritten style for the title */
        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--deep-pink);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        /* Glassmorphism Card Style */
        .card { 
            border: none; 
            border-radius: 25px; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(255, 175, 204, 0.2); 
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Styled Input Field */
        .form-control {
            border-radius: 15px;
            border: 2px solid #ffcad4;
            padding: 12px;
            background: rgba(255, 255, 255, 0.9);
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(255, 175, 204, 0.5);
            border-color: var(--soft-pink);
        }

        /* Girly Button */
        .btn-custom { 
            background: linear-gradient(to right, #ff85a2, #ffafcc); 
            color: white; 
            border: none;
            border-radius: 15px; 
            font-weight: 600;
            padding: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-custom:hover { 
            background: linear-gradient(to right, #ffafcc, #ff85a2);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
        }

        /* Message Styling */
        .msg-card {
            border-left: 5px solid var(--soft-pink);
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.8);
        }

        .msg-card p {
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .timestamp {
            font-size: 0.7rem;
            color: #b1a7a6;
            text-transform: uppercase;
        }

        .footer-link {
            color: var(--deep-pink);
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .footer-link:hover {
            letter-spacing: 1px;
            color: #ff4d6d;
        }

        /* Cute Sparkle icons */
        .sparkle { color: var(--soft-pink); }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1><span class="sparkle">✨</span> Drisya's Homepage <span class="sparkle">✨</span></h1>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 mb-5">
                    <form action="/send" method="POST">
                        <input type="text" name="content" class="form-control mb-3" placeholder="Drop a sweet message..." required>
                        <button type="submit" class="btn btn-custom w-100">Send with Love 🎀</button>
                    </form>
                    <div class="mt-3">
                        <a href="/about" class="footer-link">visit my profile →</a>
                    </div>
                </div>

                <h5 class="text-muted mb-4" style="font-weight: 300; letter-spacing: 2px;">LATEST THOUGHTS</h5>
                
                {% for msg in messages %}
                <div class="card msg-card p-3 text-start">
                    <p>{{ msg.content }}</p>
                    <div class="timestamp">
                        🕒 {{ msg.timestamp.strftime('%I:%M %p') }}
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
